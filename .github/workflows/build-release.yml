name: Build and Release APK (Meta Quest)

# Trigger on semantic version tags (e.g. v1.0.0) or manually with a version input.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  # ── Job 1: Activate Unity license ─────────────────────────────────────────
  #
  # This job requests a Unity activation file (.alf), uploads it as an
  # artefact, and then uses it to obtain a valid license (.ulf).
  #
  # One-time setup required:
  #   1. Run this workflow once — download the "activation-file" artefact.
  #   2. Upload the .alf file at https://license.unity3d.com/manual
  #   3. Select "Unity Personal" and download the resulting .ulf file.
  #   4. Add the full contents of the .ulf file as a GitHub secret:
  #        Settings → Secrets → Actions → New secret → UNITY_LICENSE
  #   5. After UNITY_LICENSE is set, this job becomes a no-op (skipped).
  activate:
    name: Activate Unity License
    runs-on: ubuntu-latest
    # Skip if UNITY_LICENSE is already stored as a secret.
    if: ${{ secrets.UNITY_LICENSE == '' }}
    steps:
      - name: Request Unity activation file (.alf)
        uses: game-ci/unity-request-activation-file@v2
        id: alf

      - name: Upload activation file artefact
        uses: actions/upload-artifact@v4
        with:
          name: activation-file
          path: ${{ steps.alf.outputs.filePath }}
          # ── After downloading this artefact ──────────────────────────────
          # 1. Go to https://license.unity3d.com/manual
          # 2. Upload the .alf file and choose "Unity Personal".
          # 3. Download the .ulf file and copy its full XML contents.
          # 4. Add it as a GitHub secret named UNITY_LICENSE.
          # 5. Re-run the main workflow — this job will be skipped from now on.

  # ── Job 2: Build APK and publish GitHub Release ───────────────────────────
  build-and-release:
    name: Build APK and publish Release
    runs-on: ubuntu-latest
    # Wait for activation job (even if it was skipped).
    needs: activate

    # Needed to create releases and push tags on workflow_dispatch.
    permissions:
      contents: write

    steps:
      # ── 1. Source code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # ── 2. Resolve the version string ───────────────────────────────────
      - name: Determine release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # ── 3. Cache Unity Library (speeds up subsequent builds) ─────────────
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      # ── 4. Build Android APK via game-ci ────────────────────────────────
      #
      # Meta Quest 2 (Snapdragon XR2)  → ARM64, Android 10 (API 29)
      # Meta Quest 3 (Snapdragon XR2 Gen 2) → ARM64, Android 12 (API 32)
      #
      # Required repository secrets:
      #   UNITY_LICENSE   – full contents of the .ulf license file
      #   UNITY_EMAIL     – Unity account e-mail
      #   UNITY_PASSWORD  – Unity account password
      #
      # Optional keystore secrets (omit for a debug/sideload build):
      #   ANDROID_KEYSTORE_BASE64  – base64-encoded .keystore file
      #   ANDROID_KEYSTORE_PASS    – keystore password
      #   ANDROID_KEYALIAS_NAME    – key alias
      #   ANDROID_KEYALIAS_PASS    – key alias password
      - name: Build Android APK
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.0.60f1
          targetPlatform: Android
          androidExportType: androidPackage
          androidSymbolType: none
          buildName: VRParkour
          buildsPath: build
          versioning: Custom
          version: ${{ steps.version.outputs.version }}
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}

      # ── 5. Upload APK as workflow artefact ──────────────────────────────
      - name: Upload APK artefact
        uses: actions/upload-artifact@v4
        with:
          name: VRParkour-${{ steps.version.outputs.version }}-Android
          path: build/Android/**/*.apk
          retention-days: 7

      # ── 6. Create GitHub Release ────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: VRParkour ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: build/Android/**/*.apk
          body: |
            ## VRParkour ${{ steps.version.outputs.version }}

            ### Kompatibilität / Compatibility
            - ✅ Meta Quest 2
            - ✅ Meta Quest 3

            ### Installation / Sideloading
            1. Lade die APK-Datei herunter / Download the APK file below.
            2. Aktiviere den Entwicklermodus auf deiner Quest / Enable Developer Mode on your Quest.
            3. Installiere die APK via [SideQuest](https://sidequestvr.com/) oder per ADB:
               ```
               adb install VRParkour.apk
               ```
